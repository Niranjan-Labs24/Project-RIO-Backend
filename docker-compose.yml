services:
  db:
    # Built from db/Dockerfile (postgres:18 + a baked self-signed TLS cert) so
    # the database can serve connections over TLS (RIO-NFR-001). ssl is enabled
    # via `command:` below; clients opt in with DB_SSL=true. Non-TLS clients
    # still connect (ssl=on accepts both), so DB_SSL defaults to false.
    build:
      context: .
      dockerfile: db/Dockerfile
    command:
      - postgres
      - -c
      - ssl=on
      - -c
      - ssl_cert_file=/certs/server.crt
      - -c
      - ssl_key_file=/certs/server.key
    container_name: cnap-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      # postgres:18 images store versioned data in a PG_MAJOR-named subdirectory by
      # default (PGDATA=/var/lib/postgresql/18/docker) and refuse to start if a volume
      # is mounted directly at /var/lib/postgresql/data without one. Point PGDATA at a
      # subdirectory of our mount so the existing /data mount path keeps working.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # Host port defaults to 5432. If your host already has PostgreSQL bound to
      # 5432 (e.g. a native Windows service), set DB_HOST_PORT in your local .env
      # to an unused port instead — docker compose auto-reads .env for this
      # substitution. The container's internal port always stays 5432; update
      # DATABASE_URL / APP_DATABASE_URL host ports to match if you override this.
      - '${DB_HOST_PORT:-5432}:5432'
    volumes:
      - cnap-db-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: cnap-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      # Inside the compose network the api reaches the db container by its
      # service name on the container's *internal* port (always 5432,
      # regardless of DB_HOST_PORT — that variable only remaps the host-side
      # publish port used by host tools like `pnpm prisma migrate deploy`).
      # NOTE: DATABASE_URL (cnap_owner, the migration/seed role) is
      # intentionally NOT set here. The api container never runs migrations
      # (see below) and the app schema no longer accepts/requires owner
      # credentials — only APP_DATABASE_URL (cnap_app, NOBYPASSRLS).
      APP_DATABASE_URL: postgresql://cnap_app:cnap_app_dev_pw@db:5432/cnap
      LOG_LEVEL: info
    # Migrations are NOT run automatically here: `prisma` (the CLI) and
    # prisma.config.ts are dev-only tooling and this runtime image is built
    # with `pnpm install --prod`, so the CLI isn't present. Apply schema
    # changes from the host (or a one-off `build` target container) with
    # `pnpm prisma migrate deploy` before/while this service starts — see
    # README.md "Quick start" and "Migrations in Docker".
    ports:
      # Host port defaults to 4000 (the FE default NEXT_PUBLIC_API_BASE_URL is
      # http://localhost:4000/api). Override with API_HOST_PORT in your local
      # .env if 4000 is already taken on your machine.
      - '${API_HOST_PORT:-4000}:4000'

volumes:
  cnap-db-data:
